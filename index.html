<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Morning Digest</title>
  <style>
    body { font-family: Georgia, serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #fafaf7; color: #222; }
    h1 { font-size: 2rem; border-bottom: 2px solid #222; padding-bottom: 10px; }
    .meta { color: #888; margin-bottom: 30px; }
    .topic { background: white; border-left: 4px solid #4a90d9; padding: 20px; margin-bottom: 25px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .topic h2 { margin: 0 0 12px; font-size: 1.2rem; color: #4a90d9; }
    .topic p { white-space: pre-wrap; line-height: 1.7; margin: 0; }
    .loading { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>☕ Morning Digest</h1>
  <div class="meta" id="meta">Loading...</div>
  <div id="content"><p class="loading">Fetching your digest...</p></div>

  <script>
    fetch('digest.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('meta').textContent = 'Generated: ' + data.generated_at;
        const content = document.getElementById('content');
        content.innerHTML = data.topics.map(t => `
          <div class="topic">
            <h2>${t.title}</h2>
            <p>${t.summary}</p>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p>No digest available yet. Run the workflow manually to generate the first one.</p>';
      });
  </script>
</body>
</html>
