name: Nightly Digest

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour; the time-gate step decides whether to actually run
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Time gate
        id: gate
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          should_run = event == "workflow_dispatch"

          if should_run:
              print("workflow_dispatch -> bypassing time gate")
          else:
              with open("config.json") as f:
                  cfg = json.load(f)
              tz_name = cfg.get("schedule", {}).get("timezone", "UTC")
              target_hour = int(cfg.get("schedule", {}).get("hour", 7))
              tz = ZoneInfo(tz_name)
              now = datetime.now(tz)
              today_local = now.date()

              # Find the local date of the most recent successful digest, so we
              # only fire once per local day even if cron is delayed past the hour.
              last_local = None
              try:
                  with open("digest.json") as f:
                      d = json.load(f)
                  generated = d.get("generated_at", "")
                  gen_utc = datetime.strptime(generated, "%Y-%m-%d %H:%M UTC").replace(tzinfo=ZoneInfo("UTC"))
                  last_local = gen_utc.astimezone(tz).date()
              except Exception as e:
                  print(f"no readable previous digest ({e!r}); treating last_local as never")

              already_today = (last_local == today_local)
              should_run = (now.hour >= target_hour) and not already_today
              print(
                  f"tz={tz_name} target_hour={target_hour} "
                  f"now={now.isoformat()} today_local={today_local} "
                  f"last_local={last_local} already_today={already_today} "
                  f"should_run={should_run}"
              )

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install anthropic

      - name: Run fetch script
        if: steps.gate.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit digest.json
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add digest.json
          git commit -m "Daily digest $(date +'%Y-%m-%d')" || echo "No changes"
          git push
